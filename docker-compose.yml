version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: ./docker/api.Dockerfile
    container_name: ortaq-api
    restart: unless-stopped
    env_file:
      - ./.env.production.example
    environment:
      NODE_ENV: production
      API_PORT: 3000
      SQLITE_DB_PATH: /data/sqlite/app.db
      UPLOAD_DIR: /data/uploads
      BACKUP_DIR: /data/backups
      TRUST_PROXY: 'true'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3000/ready']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ortaq_sqlite:/data/sqlite
      - ortaq_uploads:/data/uploads
      - ortaq_backups:/data/backups

  web:
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    container_name: ortaq-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.8-alpine
    container_name: ortaq-caddy
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  ortaq_sqlite:
  ortaq_uploads:
  ortaq_backups:
  caddy_data:
  caddy_config:
